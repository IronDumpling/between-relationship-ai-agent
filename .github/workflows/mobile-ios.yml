name: Mobile iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  eas-build:
    name: Manual EAS iOS build
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile == 'production' && 'production' || 'test' }}
    env:
      EXPO_NO_TELEMETRY: "1"
    defaults:
      run:
        working-directory: mobile/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/ios/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Start EAS build
        run: eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive --no-wait
